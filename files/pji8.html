<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PJI8 Dashboard</title>
    <style>
    /* 1. 画面全体のレイアウト：右下固定用 */
    body {
        margin: 0;
        padding: 0;
        overflow: hidden; /* スクロールバーを消す */
        background: #1a1b26; /* Tokyo Night風の落ち着いた紺色 */
        font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: flex-end; /* 下寄せ */
        justify-content: flex-end; /* 右寄せ */
        box-sizing: border-box;
    }

    /* 2. キーボード全体のコンテナ */
    .keyboard {
        margin-bottom: 40px;
        padding: 15px;
        display: grid;
        grid-template-rows: repeat(4, 52px); /* 段の高さを微調整 */
        gap: 6px;
        /* 右下常駐なら、少し透過させると邪魔にならない */
        opacity: 0.9;
        transform: scale(0.9); /* ウィンドウが小さい場合はここを0.8とかに下げる */
        transform-origin: bottom right;
        transition: opacity 0.3s ease;
    }

    .keyboard:hover {
        opacity: 1.0; /* マウスを乗せた時だけハッキリ見える */
    }

    /* 3. 段ごとの横並び設定 */
    .row {
        display: flex;
        gap: 6px;
    }

    /* 段ズレの再現（JIS配列風） */
    .row-1 { padding-left: 0px; }
    .row-2 { padding-left: 18px; }
    .row-3 { padding-left: 38px; }
    .row-4 { padding-left: 65px; }

    /* 4. 各キーの基本デザイン */
    .key {
        width: 50px;
        height: 48px;
        background: #24283b;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 1px solid #414868;
        box-shadow: 0 3px #16161e;
        position: relative;
    }

    /* キー表面の印字（物理キーの名前） */
    .key-code {
        font-size: 10px;
        color: #565f89;
        position: absolute;
        top: 4px;
        left: 6px;
        text-transform: uppercase;
    }

    /* PJI8での割り当て（かな・役割） */
    .key-kana {
        font-size: 16px;
        font-weight: bold;
        margin-top: 6px;
    }

    /* 5. グループ別の色分け（周辺視野で認識しやすくする） */
    /* 子音：青 */
    .consonant { border-color: #7aa2f7; border-width: 1.5px; }
    .consonant .key-kana { color: #7aa2f7; }

    /* 母音：紫 */
    .vowel { border-color: #bb9af7; border-width: 1.5px; }
    .vowel .key-kana { color: #bb9af7; }

    /* 拡張（二重母音・撥音）：緑 */
    .ext { border-color: #9ece6a; border-width: 1.5px; }
    .ext .key-kana { color: #9ece6a; }

    /* 特殊機能（拗音・ん・っ）：オレンジ */
    .special { border-color: #e0af68; border-width: 1.5px; }
    .special .key-kana { color: #e0af68; }

    /* 記号など：グレー */
    .symbol .key-kana { color: #a9b1d6; font-size: 14px; }
    </style>
</head>
<body>
    <div class="keyboard">
        <div class="row row-1">
            <div class="key special"><span class="key-code">1</span><span class="key-kana">小</span></div>
            <div class="key consonant"><span class="key-code">2</span><span class="key-kana">z</span></div>
            <div class="key consonant"><span class="key-code">3</span><span class="key-kana">m</span></div>
            <div class="key special"><span class="key-code">4</span><span class="key-kana">記</span></div>
            <div class="key consonant"><span class="key-code">5</span><span class="key-kana">f</span></div>
            <div class="key consonant"><span class="key-code">6</span><span class="key-kana">v</span></div>
            <div class="key ext"><span class="key-code">7</span><span class="key-kana">un</span></div>
            <div class="key ext"><span class="key-code">8</span><span class="key-kana">in</span></div>
            <div class="key ext"><span class="key-code">9</span><span class="key-kana">on</span></div>
            <div class="key ext"><span class="key-code">0</span><span class="key-kana">en</span></div>
        </div>
        <div class="row row-2">
            <div class="key consonant"><span class="key-code">Q</span><span class="key-kana">b</span></div>
            <div class="key consonant"><span class="key-code">W</span><span class="key-kana">r</span></div>
            <div class="key special"><span class="key-code">E</span><span class="key-kana">ん</span></div>
            <div class="key consonant"><span class="key-code">R</span><span class="key-kana">n</span></div>
            <div class="key consonant"><span class="key-code">T</span><span class="key-kana">t</span></div>
            <div class="key ext"><span class="key-code">Y</span><span class="key-kana">uu</span></div>
            <div class="key ext"><span class="key-code">U</span><span class="key-kana">an</span></div>
            <div class="key ext"><span class="key-code">I</span><span class="key-kana">ai</span></div>
            <div class="key ext"><span class="key-code">O</span><span class="key-kana">ou</span></div>
            <div class="key ext"><span class="key-code">P</span><span class="key-kana">ei</span></div>
        </div>
        <div class="row row-3">
            <div class="key consonant"><span class="key-code">A</span><span class="key-kana">w</span></div>
            <div class="key consonant"><span class="key-code">S</span><span class="key-kana">h</span></div>
            <div class="key consonant"><span class="key-code">D</span><span class="key-kana">s</span></div>
            <div class="key consonant"><span class="key-code">F</span><span class="key-kana">k</span></div>
            <div class="key consonant"><span class="key-code">G</span><span class="key-kana">g</span></div>
            <div class="key vowel"><span class="key-code">H</span><span class="key-kana">あ</span></div>
            <div class="key vowel"><span class="key-code">J</span><span class="key-kana">い</span></div>
            <div class="key vowel"><span class="key-code">K</span><span class="key-kana">う</span></div>
            <div class="key vowel"><span class="key-code">L</span><span class="key-kana">え</span></div>
            <div class="key vowel"><span class="key-code">;</span><span class="key-kana">お</span></div>
        </div>
        <div class="row row-4">
            <div class="key consonant"><span class="key-code">Z</span><span class="key-kana">y</span></div>
            <div class="key consonant"><span class="key-code">X</span><span class="key-kana">p</span></div>
            <div class="key consonant"><span class="key-code">C</span><span class="key-kana">d</span></div>
            <div class="key special"><span class="key-code">V</span><span class="key-kana">っ</span></div>
            <div class="key"><span class="key-code">B</span><span class="key-kana"></span></div>
            <div class="key special"><span class="key-code">N</span><span class="key-kana">拗</span></div>
            <div class="key"><span class="key-code">M</span><span class="key-kana"></span></div>
            <div class="key"><span class="key-code">,</span><span class="key-kana">、</span></div>
            <div class="key"><span class="key-code">.</span><span class="key-kana">。</span></div>
        </div>
    </div>
</body>
</html>
